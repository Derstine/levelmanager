plugins {
    id 'java'
}

group = 'me.derstine'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = 'https://repo.papermc.io/repository/maven-public/' }
    maven { url = 'https://jitpack.io' } // for vault
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.21.1-R0.1-SNAPSHOT'
    compileOnly 'com.github.MilkBowl:VaultAPI:1.7' // for vault
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}